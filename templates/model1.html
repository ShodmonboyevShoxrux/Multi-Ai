{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-6 w-full">
    <div class="border-b border-gray-700 pb-4">
        <h2 class="text-3xl font-black text-white">🏠 1-Tugma: Uy Narxlari Prediction AI</h2>
        <p class="text-sm text-gray-400">Ko'chmas mulk parametrlariga ko'ray bozor qiymatini aniqlaydigan ML Regressor modeli</p>
    </div>

    <form action="/predict/model1" method="POST" class="bg-gray-800 p-6 rounded-2xl border border-gray-700 space-y-4 shadow-xl">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Xonalar Soni</label>
                <input type="number" name="xona" value="3" min="1" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Umumiy Maydoni (kv.m)</label>
                <input type="number" step="0.1" name="maydon" value="75.5" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
        </div>

        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl text-sm font-bold transition shadow-lg">NARXNI HISOBLASH 🚀</button>
    </form>

    {% if result %}
    <div class="bg-purple-950/50 border border-purple-500/40 p-5 rounded-2xl shadow-xl">
        <h4 class="text-sm font-bold text-purple-400 uppercase tracking-wider mb-1">🧠 Taxminiy Bozor Bahosi:</h4>
        <p class="text-2xl font-black text-white">{{ result }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
