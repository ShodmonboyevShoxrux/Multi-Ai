{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-6 w-full">
    <div class="border-b border-gray-700 pb-4">
        <h2 class="text-3xl font-black text-white">💳 3-Tugma: Credit Risk Scoring AI</h2>
        <p class="text-sm text-gray-400">Mijozning moliyaviy holatiga ko'ra kredit xavfliligini baholovchi Random Forest modeli</p>
    </div>

    <form action="/predict/model3" method="POST" class="bg-gray-800 p-6 rounded-2xl border border-gray-700 space-y-4 shadow-xl">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Mijoz Yoshi</label>
                <input type="number" name="age" value="28" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Yillik Daromadi ($)</label>
                <input type="number" name="income" value="45000" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Ish Tajribasi (Yil hisobida)</label>
                <input type="number" step="0.1" name="emp_len" value="3.5" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Kredit Miqdori ($)</label>
                <input type="number" name="loan_amt" value="12000" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Kredit Foizi (%)</label>
                <input type="number" step="0.01" name="int_rate" value="14.5" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Daromadga Nisbatan Foizi (0.0 - 1.0)</label>
                <input type="number" step="0.01" name="percent" value="0.25" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
            </div>
        </div>
        
        <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Kredit Tarixi Uzunligi (Yil)</label>
            <input type="number" name="hist_len" value="5" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500">
        </div>

        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl text-sm font-bold transition shadow-lg">RISKNI TAHLIL QILISH 🚀</button>
    </form>

    {% if result %}
    <div class="bg-purple-950/50 border border-purple-500/40 p-5 rounded-2xl shadow-xl">
        <h4 class="text-sm font-bold text-purple-400 uppercase tracking-wider mb-1">🧠 Kredit Risk Xulosasi:</h4>
        <p class="text-lg font-bold text-white">{{ result }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
