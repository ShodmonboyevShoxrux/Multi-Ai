<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi AI Hub Tizimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex h-screen overflow-hidden">

    <div class="w-80 bg-gray-800 p-6 flex flex-col justify-between border-r border-gray-700">
        <div>
            <div class="flex items-center space-x-3 mb-8">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white font-bold text-xl">⚡</div>
                <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">MULTI AI HUB</h1>
            </div>
            
            <nav class="space-y-3">
                <a href="/" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition {% if active_page == 'home' %}bg-indigo-600 text-white font-semibold{% else %}text-gray-400 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🤖 Universal Gen AI</span>
                </a>
                <div class="pt-4 border-t border-gray-700 my-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Maxsus AI Modellar</div>
                
                <a href="/model/1" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition {% if active_page == 'model1' %}bg-purple-600 text-white font-semibold{% else %}text-gray-400 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🏠 1-Tugma: Uy Narxlari</span>
                </a>
                <a href="/model/2" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition {% if active_page == 'model2' %}bg-purple-600 text-white font-semibold{% else %}text-gray-400 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>📝 2-Tugma: Resume Screening</span>
                </a>
                <a href="/model/3" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition {% if active_page == 'model3' %}bg-purple-600 text-white font-semibold{% else %}text-gray-400 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>💳 3-Tugma: Credit Scoring</span>
                </a>
                <a href="/model/4" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition {% if active_page == 'model4' %}bg-purple-600 text-white font-semibold{% else %}text-gray-400 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🚗 4-Tugma: Auto Multimodal</span>
                </a>
            </nav>
        </div>
        <div class="text-xs text-gray-500 text-center border-t border-gray-700 pt-4">Developed by Shoxrux • 2026</div>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto p-10">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
