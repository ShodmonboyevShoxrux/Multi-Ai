{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-6 w-full">
    <div class="border-b border-gray-700 pb-4">
        <h2 class="text-3xl font-black text-white">📝 2-Tugma: Resume Screening AI</h2>
        <p class="text-sm text-gray-400">Nomzod rezyumesini vakansiya talablariga mosligini tahlil qiluvchi NLP modeli</p>
    </div>

    <form action="/predict/model2" method="POST" class="bg-gray-800 p-6 rounded-2xl border border-gray-700 space-y-4 shadow-xl">
        <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Rezyume Matni yoki Ko'nikmalar (Skills)</label>
            <textarea name="text" rows="6" required placeholder="Masalan: Python developer, Django framework, PostgreSQL, Git, FastAPI mikroservislar bilan ishlash tajribasi..." class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-purple-500"></textarea>
        </div>

        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl text-sm font-bold transition shadow-lg">REZYUMENI SKANERLASH 🚀</button>
    </form>

    {% if result %}
    <div class="bg-purple-950/50 border border-purple-500/40 p-5 rounded-2xl shadow-xl">
        <h4 class="text-sm font-bold text-purple-400 uppercase tracking-wider mb-1">🧠 NLP Skaner Natijasi:</h4>
        <p class="text-xl font-bold text-white">{{ result }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
